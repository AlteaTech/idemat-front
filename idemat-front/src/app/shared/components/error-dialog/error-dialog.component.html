<div [ngClass]="data.type" class="header">
  <mat-icon>{{ data.type === 'error' ? 'error_outline' : 'warning_amber' }}</mat-icon>
  <h2 mat-dialog-title>{{ data.title }}</h2>
</div>

<div mat-dialog-content>
  <p>{{ data.message }}</p>
</div>

<div align="end" mat-dialog-actions>

  <button class="btn-orange btn" mat-dialog-close mat-flat-button>
    Fermer
  </button>
</div>
