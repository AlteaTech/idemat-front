@if (loading()) {
  <div class="loading-screen">
    <mat-spinner diameter="48"></mat-spinner>
  </div>
} @else {
  <div class="page-container">
    <div class="page-title">
      <button class="btn-retour" (click)="retour()">
        <img src="Gauche.svg" alt="" class="btn-retour-img" />
      </button>
      <h1>Déchetteries</h1>
    </div>
    <div class="liste">
      @for (d of dechetteries(); track d.id) {
        <button class="liste-item" (click)="voirDetail(d.id)">
          <span class="liste-item-nom">{{ d.nom }}</span>
          <img src="Droite.svg" alt="" class="liste-item-chevron-img" />
        </button>
      } @empty {
        <p class="liste-vide">Aucune déchetterie disponible pour votre contrat.</p>
      }
    </div>
  </div>
}
